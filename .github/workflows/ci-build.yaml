name: CI Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Langkah 1: Memeriksa kode (checkout)
      - name: Checkout code
        uses: actions/checkout@v3

      # Langkah 2: Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      # Langkah 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-talisman flask-cors nose coverage flake8 pylint

      # Langkah 4: Linting dengan Flake8 (setelah checkout)
      - name: Lint with flake8
        run: |
          flake8 service/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 service/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # Langkah 5: Linting dengan Pylint (setelah checkout)
      - name: Lint with pylint
        run: |
          pylint service/ --fail-under=8.0

      # Langkah 6: Menjalankan unit test dengan nosetests (setelah linting)
      - name: Run unit tests with nosetests
        run: |
          nosetests --with-coverage --cover-package=service --cover-erase
